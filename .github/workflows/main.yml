name: Master CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── BACKEND JOB ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Validate & Deploy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Prisma Generate
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Trigger Vercel Deploy
        if: github.ref == 'refs/heads/main' && success()
        env:
          VERCEL_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_HOOK" ]; then
            echo "⚠️  VERCEL_DEPLOY_HOOK not set — skipping"
            exit 0
          fi
          curl -f -X POST "$VERCEL_HOOK"

  # ─── FRONTEND JOB ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Build Check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Dependencies
        working-directory: frontend
        run: |
          rm -f package-lock.json
          npm install

      - name: Build Check
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://crown-eve-center.onrender.com/api' }}
