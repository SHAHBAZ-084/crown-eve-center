let current = 'be';
const state = {be:{}, fe:{}};

function buildPanel(data, mode) {
  const panel = document.getElementById('panel-'+mode);
  panel.innerHTML = '';
  data.forEach((sec, si) => {
    const div = document.createElement('div');
    div.className = 'section';
    const done = sec.items.filter((_,ii) => state[mode][si+'-'+ii]).length;
    div.innerHTML = `<div class="section-header" onclick="toggleSection(this)">
      <div class="section-title">
        <span class="section-badge ${mode}-badge">${sec.badge}</span>
        ${sec.title}
      </div>
      <span class="section-count">${done}/${sec.items.length}</span>
    </div>
    <div class="items" style="display:none">
      ${sec.items.map((item,ii) => {
        const key = si+'-'+ii;
        const checked = state[mode][key];
        return `<div class="item${checked?' done':''}" onclick="toggle('${mode}',${si},${ii})">
          <div class="cb ${checked?'checked-'+mode:''}">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="item-text">${item.t}<span class="item-tag tag-${item.tag}">${item.tag}</span></span>
        </div>`;
      }).join('')}
    </div>`;
    panel.appendChild(div);
  });
  updateProgress();
}

function toggleSection(header) {
  const items = header.nextElementSibling;
  items.style.display = items.style.display === 'none' ? 'block' : 'none';
}

function toggle(mode, si, ii) {
  const key = si+'-'+ii;
  state[mode][key] = !state[mode][key];
  buildPanel(mode === 'be' ? BE : FE, mode);
  if (current !== mode) return;
  updateProgress();
}

function updateProgress() {
  const data = current === 'be' ? BE : FE;
  const total = data.reduce((a,s) => a + s.items.length, 0);
  const done = data.reduce((a,s,si) => a + s.items.filter((_,ii) => state[current][si+'-'+ii]).length, 0);
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-count').textContent = done + ' / ' + total;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-bar').className = 'progress-bar ' + (current === 'be' ? 'be-bar' : 'fe-bar');
  document.getElementById('prog-label').textContent = (current === 'be' ? 'Backend' : 'Frontend') + ' progress — ' + pct + '%';
}

function switchTab(mode) {
  current = mode;
  document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('visible'));
  const tabs = document.querySelectorAll('.tab');
  tabs[mode === 'be' ? 0 : 1].className = 'tab active-' + mode;
  document.getElementById('panel-'+mode).classList.add('visible');
  updateProgress();
}

function resetAll() {
  Object.keys(state[current]).forEach(k => { state[current][k] = false; });
  buildPanel(current === 'be' ? BE : FE, current);
}

buildPanel(BE, 'be');
buildPanel(FE, 'fe');
